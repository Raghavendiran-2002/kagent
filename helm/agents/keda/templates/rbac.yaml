apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent.fullname" . }}-keda-role
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
rules:
# KEDA custom resources
- apiGroups:
    - "keda.sh"
  resources:
    - "*"
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
# Core resources for diagnostics and Secret inspection
- apiGroups:
    - ""
  resources:
    - pods
    - events
    - namespaces
    - secrets
    - configmaps
    - services
  verbs:
    - get
    - list
    - watch
- apiGroups:
    - ""
  resources:
    - pods/log
    - pods/exec
  verbs:
    - get
# Scaling target workloads
- apiGroups:
    - apps
  resources:
    - deployments
    - statefulsets
    - replicasets
  verbs:
    - get
    - list
    - watch
    - patch
# HPA resources (KEDA creates and manages these automatically)
- apiGroups:
    - autoscaling
  resources:
    - horizontalpodautoscalers
  verbs:
    - get
    - list
    - watch
# APIService inspection — needed to diagnose FailedDiscoveryCheck on external.metrics.k8s.io
- apiGroups:
    - apiregistration.k8s.io
  resources:
    - apiservices
  verbs:
    - get
    - list
    - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kagent.fullname" . }}-keda-rolebinding
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kagent.fullname" . }}-keda-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent.fullname" . }}
    namespace: {{ include "kagent.namespace" . }}
