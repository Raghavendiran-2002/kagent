apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent.fullname" . }}-kyverno-role
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
rules:
# Kyverno custom resources
- apiGroups:
    - "kyverno.io"
  resources:
    - "*"
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
# Policy report resources (wgpolicyk8s.io)
- apiGroups:
    - "wgpolicyk8s.io"
  resources:
    - policyreports
    - clusterpolicyreports
  verbs:
    - get
    - list
    - watch
# Core resources for diagnostics
- apiGroups:
    - ""
  resources:
    - pods
    - events
    - namespaces
    - configmaps
    - secrets
    - services
  verbs:
    - get
    - list
    - watch
- apiGroups:
    - ""
  resources:
    - pods/log
    - pods/exec
  verbs:
    - get
# Workload resources
- apiGroups:
    - apps
  resources:
    - deployments
    - statefulsets
    - daemonsets
    - replicasets
  verbs:
    - get
    - list
    - watch
# Webhook configurations (for recovery and inspection)
- apiGroups:
    - admissionregistration.k8s.io
  resources:
    - validatingwebhookconfigurations
    - mutatingwebhookconfigurations
  verbs:
    - get
    - list
    - watch
    - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kagent.fullname" . }}-kyverno-rolebinding
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kagent.fullname" . }}-kyverno-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent.fullname" . }}
    namespace: {{ include "kagent.namespace" . }}
